name: 🤖 Codeforces Problem Fetcher

on:
  discussion:
    types: [created]

jobs:
  fetch-cf-metadata:
    if: github.event.discussion.category.slug == 'codeforces-arena'
    runs-on: ubuntu-latest
    permissions:
      discussions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Problem Meta & Scrape Content
        id: fetch_meta
        env:
          DISCUSSION_BODY: ${{ github.event.discussion.body }}
        shell: python
        run: |
          import os
          import requests
          import re
          from bs4 import BeautifulSoup

          body = os.getenv('DISCUSSION_BODY', '')
          
          # Precision Regex parsing your layout
          contest_match = re.search(r'### 🔢 Contest ID\s*(?:\s*)?(\d+)', body, re.DOTALL)
          index_match = re.search(r'### 🔤 Problem Index\s*(?:\s*)?([A-Z\d]+)', body, re.DOTALL)

          if contest_match and index_match:
              contest_id = int(contest_match.group(1).strip())
              index = index_match.group(1).strip().upper()
              
              print(f"Target Found -> Contest: {contest_id}, Index: {index}")
              
              # 1. Fetch Core Metadata (Rating & Tags) from API Archive
              api_url = "https://codeforces.com/api/problemset.problems"
              api_response = requests.get(api_url)
              
              rating = "Unrated"
              tags = "`No tags assigned yet`"
              name = f"Problem {index}"
              
              if api_response.status_code == 200:
                  api_data = api_response.json()
                  if api_data.get('status') == 'OK':
                      problems = api_data['result']['problems']
                      matched = next((p for p in problems if p.get('contestId') == contest_id and p.get('index') == index), None)
                      if matched:
                          name = matched['name']
                          rating = matched.get('rating', 'Unrated')
                          tags = ", ".join([f"`{t}`" for t in matched.get('tags', [])]) if matched.get('tags') else tags

              # 2. Scrape Live Problem Statement & Samples using BeautifulSoup
              url = f"https://codeforces.com/contest/{contest_id}/problem/{index}"
              page_response = requests.get(url)
              
              description_text = ""
              input_spec = ""
              output_spec = ""
              samples_text = ""
              
              if page_response.status_code == 200:
                  soup = BeautifulSoup(page_response.text, 'html.parser')
                  main_div = soup.find(class_="problem-statement")
                  
                  if main_div:
                      # Extract structured text descriptions by skipping headers and samples
                      for child in main_div.find_all("div", recursive=False):
                          classes = child.get("class", []) or []
                          if "header" in classes:
                              continue
                          elif "input-specification" in classes:
                              input_spec = child.get_text(separator="\n").strip()
                          elif "output-specification" in classes:
                              output_spec = child.get_text(separator="\n").strip()
                          elif any(c in classes for c in ["sample-tests", "sample-test"]):
                              continue
                          else:
                              description_text += child.get_text(separator="\n").strip() + "\n\n"
                      
                      # Parse all available Sample Input / Output Blocks
                      sample_div = main_div.find(class_="sample-test")
                      if sample_div:
                          inputs = sample_div.find_all(class_="input")
                          outputs = sample_div.find_all(class_="output")
                          for i in range(len(inputs)):
                              in_text = inputs[i].find("pre").get_text(separator="\n").strip()
                              out_text = outputs[i].find("pre").get_text(separator="\n").strip()
                              samples_text += f"**📥 Sample Input {i+1}:**\n
http://googleusercontent.com/immersive_entry_chip/0
