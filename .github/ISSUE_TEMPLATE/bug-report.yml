name: 🐛 Bug Report
description: File a structured report to help us identify and fix an issue in the repo, automation, or templates.
title: "[Bug]: <Short description of the bug>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thank you for reporting a bug!
        Please provide clear details so we can reproduce and fix the issue quickly.
  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce
      description: Explain step-by-step how we can reproduce the error.
      placeholder: |
        1. Go to Discussions
        2. Click on 'New Discussion' and choose 'Codeforces Arena' or 'LeetCode Arena'
        3. Paste the following text...
        4. See the workflow run fail with error...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: 🎯 Expected Behavior
      description: What did you expect to happen?
      placeholder: e.g. The bot should parse the header and successfully post a briefing comment.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: ⚠️ Actual Behavior
      description: What actually happened? Provide logs or screenshots if possible.
      placeholder: e.g. The workflow crashed with a 'Resource not accessible by integration' error on Step 4.
    validations:
      required: true
  - type: input
    id: workflow-run-link
    attributes:
      label: 🔗 GitHub Action Run Link (If applicable)
      description: If this is an automation workflow bug, link the failed action run here.
      placeholder: e.g. https://github.com/ananya-09/DSA-Discussions/actions/runs/12345678
  - type: checkboxes
    id: diagnostic-checklist
    attributes:
      label: Diagnostic Checklist
      options:
        - label: I checked the action logs or error trace before reporting this.
          required: true
        - label: This issue occurs consistently under the steps described above.
          required: true
